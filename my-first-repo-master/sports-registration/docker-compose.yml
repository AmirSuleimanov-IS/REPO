version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lab2_postgres
    environment:
      POSTGRES_USER: sport_app
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: kinetic_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - sports-network

  adminer:
    image: adminer:latest
    container_name: lab2_adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - sports-network

  minio:
    image: minio/minio:latest
    container_name: minio-sports
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sports-network

  app:
    build: .
    container_name: kinetic-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
    environment:
      DB_HOST: postgres
      DB_USER: sport_app
      DB_PASS: secret123
      DB_NAME: kinetic_db
      DB_PORT: 5432
      MINIO_ENDPOINT: http://minio:9000
    networks:
      - sports-network
    volumes:
      - .:/app

volumes:
  minio_data:
  pg_data:  # ⬅️ новый том

networks:
  sports-network:
    driver: bridge